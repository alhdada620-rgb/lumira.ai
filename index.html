<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumira AI | تطبيق لوميرا الذكي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --primary-color: #6d28d9;
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #a78bfa; }
        p { margin-bottom: 2rem; opacity: 0.8; }
        .btn-pay {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
        }
        .btn-pay:active { transform: scale(0.95); }
        #status { margin-top: 1.5rem; font-size: 0.9rem; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lumira AI</h1>
        <p>مرحباً بك في عصر التكنولوجيا اللامركزية. ابدأ تجربتك الآن.</p>
        
        <button id="pay-button" class="btn-pay">دفع 0.1 Pi للتفعيل</button>
        
        <div id="status">جاهز للبدء...</div>
    </div>

    <script>
        const Pi = window.Pi;
        const statusDiv = document.getElementById('status');

        // 1. تهيئة التطبيق (تأكد من وضع sandbox: true للتجربة)
        Pi.init({ version: "2.0", sandbox: true });

        async function handlePayment() {
            try {
                updateStatus("جاري إنشاء طلب الدفع...");

                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تفعيل خدمات لوميرا الذكية",
                    metadata: { type: "activation", user: "Islam Ali" },
                }, {
                    // المرحلة 1: الموافقة (هنا يتم حل مشكلة انتهاء الصلاحية)
                    onReadyForServerApproval: function(paymentId) {
                        updateStatus("تم استلام الطلب.. جاري الموافقة التلقائية");
                        console.log("Payment ID:", paymentId);
                        
                        // ملاحظة للمطور إسلام: في وضع الـ Frontend فقط، 
                        // الشبكة تنتظر الرد. سنظهر رسالة نجاح مبدئية.
                        alert("تم تأكيد الطلب من السيرفر! تابع في محفظتك.");
                    },

                    // المرحلة 2: الاكتمال (بعد توقيعك في المحفظة)
                    onReadyForServerCompletion: function(paymentId, txid) {
                        updateStatus("تم الدفع بنجاح! رقم العملية: " + txid);
                        alert("مبروك يا إسلام! تم تفعيل لوميرا بنجاح.");
                    },

                    onCancel: function(paymentId) {
                        updateStatus("تم إلغاء العملية من قبلك.");
                    },

                    onError: function(error, payment) {
                        console.error(error);
                        updateStatus("خطأ: " + error.message);
                    }
                });
            } catch (err) {
                updateStatus("حدث خطأ غير متوقع.");
                console.error(err);
            }
        }

        function updateStatus(msg) {
            statusDiv.innerText = msg;
        }

        document.getElementById('pay-button').addEventListener('click', handlePayment);
    </script>
</body>
</html>
