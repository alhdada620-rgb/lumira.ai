<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوميرا - Lumira AI</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; padding: 0 20px; }
        .btn-pay {
            background-color: #ffa500;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.3);
        }
        #status-msg { margin-top: 20px; color: #ff4444; font-size: 14px; }
    </style>
</head>
<body>

    <h1>مرحباً بك في لوميرا</h1>
    <p>تطبيق المرأة الذكية لتجربة الملابس والمكياج بالذكاء الاصطناعي</p>

    <button class="btn-pay" onclick="handlePayment()">تجربة الخدمة بـ 0.1 Pi</button>
    
    <div id="status-msg"></div>

    <script>
        // 1. تهيئة الـ SDK (الخطوة اللي كانت بتسبب الخطأ)
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // 2. التحقق من دخول المستخدم فور فتح الصفحة
        async function authUser() {
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    console.log("دفعة معلقة مكتشفة:", payment);
                };
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log("تم تسجيل دخول المستخدم:", user.username);
            } catch (err) {
                document.getElementById('status-msg').innerText = "يرجى فتح التطبيق من داخل Pi Browser";
            }
        }

        // 3. وظيفة الدفع (الزر الأصفر)
        async function handlePayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تجربة لوميرا الذكية",
                    metadata: { project: "Lumira_AI" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("في انتظار موافقة السيرفر:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("تمت العملية بنجاح! شكراً لاستخدامك لوميرا.");
                    },
                    onCancel: (paymentId) => { console.log("تم الإلغاء"); },
                    onError: (error, payment) => { console.error("خطأ:", error); },
                });
            } catch (err) {
                alert("فشل بدء عملية الدفع. تأكد من توفر الرصيد.");
            }
        }

        // تشغيل التحقق تلقائياً
        authUser();
    </script>
</body>
</html>
