<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumira AI | لوميرا ذكاء اصطناعي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #9b4dff;
            border-radius: 20px;
            background: rgba(155, 77, 255, 0.1);
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.5);
        }
        h1 { color: #9b4dff; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #ccc; }
        .btn-pay {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }
        .btn-pay:hover { transform: scale(1.05); background-color: #e6b800; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>LUMIRA AI</h1>
        <p>مرحباً بك في لوميرا - مرآتك الذكية</p>
        <button class="btn-pay" onclick="transferPi()">تجربة الخدمة بـ 0.1 Pi</button>
        <div id="status"></div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function transferPi() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = "#ffcc00";
            statusDiv.innerText = "جاري الاتصال بالمحفظة...";

            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                const paymentData = {
                    amount: 0.1,
                    memo: "تجربة تطبيق لوميرا للذكاء الاصطناعي",
                    metadata: { app: "Lumira-AI" }
                };

                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        statusDiv.style.color = "#00ffcc";
                        statusDiv.innerText = "تم تجهيز الدفع! رقم العملية: " + paymentId;
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        statusDiv.innerText = "تم الدفع بنجاح! شكراً لك.";
                    },
                    onCancel: (paymentId) => {
                        statusDiv.style.color = "#ff4d4d";
                        statusDiv.innerText = "تم إلغاء عملية الدفع.";
                    },
                    onError: (error, payment) => {
                        statusDiv.style.color = "#ff4d4d";
                        statusDiv.innerText = "خطأ في الدفع: " + error.message;
                    }
                };

                await Pi.createPayment(paymentData, callbacks);

            } catch (err) {
                statusDiv.style.color = "#ff4d4d";
                statusDiv.innerText = "فشل المصادقة: " + err.message;
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("هناك عملية دفع معلقة: ", payment);
        };
    </script>
</body>
</html>
